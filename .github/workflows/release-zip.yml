name: Release ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check actions/

  build-zip:
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare archive name
        id: vars
        run: echo "archive=pipeweaver-target-status-${GITHUB_REF_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Create ZIP archive
        run: |
          zip -r "${{ steps.vars.outputs.archive }}" \
            . \
            -x ".git/*" \
            -x "__pycache__/*" \
            -x "*.pyc"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.archive }}
          path: ${{ steps.vars.outputs.archive }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vars.outputs.archive }}
