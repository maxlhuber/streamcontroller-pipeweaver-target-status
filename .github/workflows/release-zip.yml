name: Release ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare archive name
        id: vars
        run: echo "archive=pipeweaver-target-status-${GITHUB_REF_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Create ZIP archive
        run: |
          zip -r "${{ steps.vars.outputs.archive }}" \
            . \
            -x ".git/*" \
            -x "__pycache__/*" \
            -x "*.pyc"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.archive }}
          path: ${{ steps.vars.outputs.archive }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vars.outputs.archive }}
